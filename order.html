<form id="orderForm">

<label>* Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>* Contact Number</label>
<input type="tel" placeholder="03XXXXXXXXX" required>

<label>* Delivery Address</label>
<textarea rows="4" placeholder="House No, Street, Area, City" required></textarea>

<label>Area Code (Optional)</label>
<input type="text" placeholder="e.g. 54000">

<label>Special Instructions (Optional)</label>
<textarea rows="3" placeholder="Color preference, call before delivery, etc."></textarea>

<label>* Delivery Method</label>
<input type="text" value="Cash on Delivery (COD)" readonly>

<button type="submit">Place Order</button>

</form>
