<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete Your Order | LimeTree</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="top-bar">
🚚 Cash on Delivery Available Across Pakistan
</div>

<nav class="navbar">

.logo a{
color:white;
text-decoration:none;
}

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="summer.html">Summer</a></li>
<li><a href="sale.html">Sale</a></li>
<li><a href="winter.html">Winter</a></li>
</ul>

</nav>

<section class="checkout">

<div class="checkout-card">

<h1>Complete Your Order</h1>

<p>
Please fill in your delivery details below.
</p>

<form id="orderForm">

<label>* Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

<label>* Contact Number</label>

<input
type="tel"
id="phone"
placeholder="03XXXXXXXXX"
required>

<label>* Delivery Address</label>

<textarea
id="address"
rows="4"
placeholder="House No, Street, Area, City"
required></textarea>

<label>Area Code (Optional)</label>

<input
type="text"
id="area"
placeholder="e.g. 54000">

<label>Special Instructions (Optional)</label>

<textarea
id="instructions"
rows="3"
placeholder="Color preference, Call before delivery etc."></textarea>

<label>Payment Method</label>

<input
type="text"
value="Cash on Delivery (COD)"
readonly>

<button type="submit" class="btn">

Place Order on WhatsApp

</button>

</form>

</div>

</section>
<script>
const params = new URLSearchParams(window.location.search);

const product = params.get("product") || "Unspecified Product";
const price = params.get("price") || "Not Available";

document.getElementById("orderForm").addEventListener("submit", function(e){

e.preventDefault();

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();
const area = document.getElementById("area").value.trim();
const instructions = document.getElementById("instructions").value.trim();

const orderNumber = "LT-" + Date.now();

const orderDate = new Date().toLocaleString("en-PK",{
dateStyle:"medium",
timeStyle:"short"
});

const message =
`🛍️ *New LimeTree Order*

🧾 Order Number: ${orderNumber}
📅 Date: ${orderDate}

📦 Product: ${product}
💰 Price: Rs. ${price}

👤 Customer: ${name}
📞 Phone: ${phone}

🏠 Delivery Address:
${address}

📍 Area Code: ${area || "N/A"}

📝 Special Instructions:
${instructions || "None"}

💳 Payment Method:
Cash on Delivery (COD)

Thank you!`;

window.open(
`https://wa.me/923180148837?text=${encodeURIComponent(message)}`,
"_blank"
);

});
</script>

</body>
  </html>
