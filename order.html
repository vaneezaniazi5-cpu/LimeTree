<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LimeTree | Checkout</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

</head>
<script>
function updateCartCount(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let count = document.getElementById("cart-count");

    if(count){
        count.textContent = cart.length;
    }

}

updateCartCount();
</script>
<body>

<div class="announcement-bar">
    <div class="announcement-text">
        🚚 FREE DELIVERY ALL ACROSS PAKISTAN • SHOP NOW • CASH ON DELIVERY AVAILABLE •
    </div>
</div>
<nav class="navbar">

<div class="logo">
<a href="index.html">LimeTree</a>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="summer.html">Summer</a></li>
<li><a href="sale.html">Sale</a></li>
<li><a href="winter.html">Winter</a></li>
<li><a href="cart.html">🛒 <span id="cart-count">0</span></a></li>
</ul>

</nav>

<section class="checkout">

<div class="checkout-card">

<h1>Complete Your Order</h1>

<p class="checkout-text">
You're ordering
</p>

<div class="product-summary">

<h2 id="productName">
Loading...
</h2>

<p id="productPrice">
Rs. 0
</p>

</div>

<form id="orderForm">

<label>* Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

<label>* Contact Number</label>

<input
type="tel"
id="phone"
placeholder="03XXXXXXXXX"
required>

<label>* Delivery Address</label>

<textarea
id="address"
rows="4"
placeholder="House No, Street, Area"
required></textarea>

<label>* City</label>

<input
type="text"
id="city"
placeholder="Enter your city"
required>

<label>Area Code (Optional)</label>

<input
type="text"
id="area"
placeholder="e.g. 54000">


<label>Payment Method</label>

<input
type="text"
value="Cash on Delivery (COD)"
readonly>

<button
type="submit"
class="btn">

Place Order

</button>

</form>

</div>

</section>
<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby58WSaMXp3O516Uuw0F2GZ-4qb5AcAdbXy2ebPyJ9aiYbHvnR2VZVrouHKuS0h0SH4/exec";

const params = new URLSearchParams(window.location.search);

let product = "";
let price = 0;

const cart = JSON.parse(localStorage.getItem("checkoutCart"));

if(cart && cart.length > 0){

    product = "";

    cart.forEach(item=>{
        product += item.product + " - Rs. " + item.price + "\n";
        price += Number(item.price);
    });

}else{

    product = params.get("product") || "Premium Unstitched Suit";
    price = Number(params.get("price")) || 0;

}

document.getElementById("productName").innerHTML =
product.replace(/\n/g,"<br>");

document.getElementById("productPrice").textContent =
"Total: Rs. " + price;

document.getElementById("orderForm").addEventListener("submit", function(e){

    e.preventDefault();

    const order = {
        orderId: "LT-" + Date.now(),
        product: product,
        price: price,
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        city: document.getElementById("city").value,
        area: document.getElementById("area").value,
        payment: "Cash on Delivery"
    };

    fetch(WEB_APP_URL,{
        method:"POST",
        body:JSON.stringify(order)
    })
    .then(res=>res.json())
    .then(data=>{
        alert("✅ Thank you! Your order has been placed successfully.");
        document.getElementById("orderForm").reset();
    })
    .catch(err=>{
    alert(err);
    console.log(err);
});

});
</script>

</body>
</html>
