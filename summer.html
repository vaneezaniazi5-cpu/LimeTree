<script>
function addToCart(product,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
    product:product,
    price:price
});

localStorage.setItem("cart",JSON.stringify(cart));

alert(product + " added to cart!");
}
</script>
